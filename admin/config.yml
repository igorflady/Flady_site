backend:
  name: git-gateway
  branch: main

media_folder: "imagens/uploads"
public_folder: "/imagens/uploads"

locale: "pt"

collections:

  - name: "artigos"
    label: "Artigos"
    folder: "conteudo/artigos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - label: "Título"
        name: "title"
        widget: "string"

      - label: "Data de publicação"
        name: "date"
        widget: "datetime"

      - label: "Categoria"
        name: "category"
        widget: "relation"
        collection: "categorias"
        search_fields:
          - "nome"
        value_field: "nome"
        display_fields:
          - "nome"

      - label: "Descrição"
        name: "description"
        widget: "text"

      - label: "Imagem de capa"
        name: "image"
        widget: "image"
        required: false

      - label: "Artigo em destaque"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Conteúdo do artigo"
        name: "body"
        widget: "markdown"


  - name: "categorias"
    label: "Categorias"
    folder: "conteudo/categorias"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Nome da categoria"
        name: "nome"
        widget: "string"

      - label: "Descrição"
        name: "descricao"
        widget: "text"
        required: false

      - label: "Ícone"
        name: "icone"
        widget: "string"
        required: false
        hint: "Você pode adicionar um símbolo ou emoji para representar esta categoria."
