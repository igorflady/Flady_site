backend:
  name: git-gateway
  branch: main

media_folder: "imagens/uploads"
public_folder: "/imagens/uploads"

locale: "pt"

collections:
  - name: "artigos"
    label: "Artigos"
    folder: "conteudo/artigos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - label: "Título"
        name: "title"
        widget: "string"

      - label: "Data de publicação"
        name: "date"
        widget: "datetime"

      - label: "Categoria"
        name: "category"
        widget: "select"
        options:
          - "Direito"
          - "Sociedade"
          - "Universidade"
          - "Reflexões"
          - "Cultura"
          - "Opinião"

      - label: "Descrição"
        name: "description"
        widget: "text"

      - label: "Imagem de capa"
        name: "image"
        widget: "image"
        required: false

      - label: "Artigo em destaque"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Conteúdo do artigo"
        name: "body"
        widget: "markdown"
